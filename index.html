<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cosmic Time Machine</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="timeline-info">
            <h1 id="era-title">The Big Bang</h1>
            <p id="era-description">Universe begins at infinite density and temperature</p>
            <p id="time-label">13.8B years ago</p>
        </div>

        <div id="event-markers">
            <div class="event-marker" data-label="Big Bang" data-scroll="0"></div>
            <div class="event-marker" data-label="First Stars" data-scroll="0.233"></div>
            <div class="event-marker" data-label="First Galaxies" data-scroll="0.3"></div>
            <div class="event-marker" data-label="Milky Way" data-scroll="0.466"></div>
            <div class="event-marker" data-label="Solar System" data-scroll="0.5"></div>
            <div class="event-marker" data-label="Present Day" data-scroll="0.6"></div>
            <div class="event-marker" data-label="Red Giant Sun" data-scroll="0.7"></div>
            <div class="event-marker" data-label="Black Hole Era" data-scroll="0.9"></div>
            <div class="event-marker" data-label="Heat Death" data-scroll="1"></div>
        </div>

        <div id="nasa-panel">
            <p id="nasa-fact">Loading NASA data</p>
        </div>

        <div id="planet-info">
            <button id="close-planet-info" aria-label="Close">✕</button>
            <h2 id="planet-name">Earth</h2>
            <p>Gravity: <span id="planet-gravity">1.0g</span></p>
            <p>Star Brightness: <span id="planet-brightness">100%</span></p>
            <p class="hint">Click anywhere to exit</p>
        </div>

        <div id="scroll-hint">↓ Scroll to travel through time ↓</div>

        <div id="timeline-slider-container">
            <span class="slider-label">Big Bang</span>
            <div id="slider-wrapper">
                <input type="range" id="timeline-slider" min="0" max="100" value="0" step="0.1">
                <span id="slider-current-label">The Big Bang</span>
            </div>
            <span class="slider-label">Heat Death</span>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
        <script src="js/globals.js"></script>
        <script src="js/scene.js"></script>
        <script src="js/audio.js"></script>
        <script src="js/bigbang.js"></script>
        <script src="js/galaxies.js"></script>
        <script src="js/stars.js"></script>
        <script src="js/solar-system.js"></script>
        <script src="js/planets.js"></script>
        <script src="js/timeline.js"></script>
        <script src="js/main.js"></script>
    </body>
</html>
